services:
  - type: web
    name: codesense-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://etech.vercel.app,https://etech-73rk6prq7-harshdachhabra28-5581s-projects.vercel.app"
    autoDeploy: true
