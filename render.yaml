services:
  - type: web
    name: codesense-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://code-explainer-murex.vercel.app,https://etech.vercel.app"
    autoDeploy: true
